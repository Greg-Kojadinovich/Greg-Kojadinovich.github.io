<html lang="en">

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050d1a;
      color: #e8eef6;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px 0;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #4a9fe2;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 14px;
      color: #8b98b1;
      font-weight: 500;
    }
    
    .view-toggle {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }
    
    .view-btn {
      padding: 10px 20px;
      border: 2px solid #4a9fe2;
      background: transparent;
      color: #4a9fe2;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .view-btn.active {
      background: #4a9fe2;
      color: #050d1a;
    }
    
    .view-btn:hover {
      background: rgba(74, 144, 226, 0.1);
    }
    
    /* HERO VIEW */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }
    
    @media (min-width: 768px) {
      .hero-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1200px) {
      .hero-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    .product-card {
      background: #0b1729;
      border: 1px solid rgba(74, 144, 226, 0.18);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    
    .product-card:hover {
      border-color: #4a9fe2;
    }
    
    /* CAROUSEL */
    .carousel-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      overflow: hidden;
      border-radius: 10px;
    }
    
    .carousel-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .carousel-item {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .carousel-item.active {
      opacity: 1;
      z-index: 1;
    }
    
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* CONTROLS */
    .carousel-controls {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .dot.active {
      background: #4a9fe2;
      width: 24px;
      border-radius: 4px;
    }
    
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(74, 144, 226, 0.8);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.3s ease;
      z-index: 5;
    }
    
    @media (min-width: 768px) {
      .carousel-arrow {
        display: flex;
      }
    }
    
    .carousel-arrow:hover {
      background: #4a9fe2;
    }
    
    .carousel-prev {
      left: 8px;
    }
    
    .carousel-next {
      right: 8px;
    }
    
    .image-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      z-index: 5;
    }
    
    /* PRODUCT INFO */
    .product-info {
      padding: 16px;
    }
    
    .product-name {
      font-size: 16px;
      font-weight: 700;
      color: #e8eef6;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #4a9fe2;
      margin-bottom: 12px;
    }
    
    .shop-btn {
      width: 100%;
      padding: 12px;
      background: #4a9fe2;
      color: #050d1a;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .shop-btn:active {
      background: #357fc9;
      transform: scale(0.98);
    }
    
    /* ALL IMAGES VIEW - PRODUCT GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 40px;
    }
    
    .product-square {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      border: 2px solid rgba(212, 175, 55, 0.3);
      background: rgba(212, 175, 55, 0.03);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .product-square:hover {
      border-color: rgba(212, 175, 55, 0.7);
      background: rgba(212, 175, 55, 0.08);
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.15);
      transform: translateY(-4px);
    }
    
    .product-square img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .product-square-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: #faf4e6;
      padding: 12px 10px 8px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    
    /* PRODUCT DETAIL MODAL */
    #product-detail-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    #product-detail-modal.active {
      display: flex;
    }
    
    .product-detail-content {
      position: relative;
      width: 100%;
      max-width: 90vw;
      max-height: 90vh;
      background: #050d1a;
      border-radius: 12px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      overflow: auto;
      padding: 30px;
    }
    
    .product-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .product-detail-title {
      font-size: 24px;
      font-weight: 700;
      color: #d4af37;
    }
    
    .product-detail-close {
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .product-detail-close:hover {
      background: rgba(212, 175, 55, 0.4);
    }
    
    .product-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    
    .product-detail-img {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      overflow: hidden;
      background: #000;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .product-detail-img:hover {
      border-color: rgba(212, 175, 55, 0.6);
      transform: scale(1.05);
    }
    
    .product-detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;

    #image-lightbox.active {

    }
    
    .lightbox-content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .lightbox-image-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .lightbox-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.2s ease;
    }
    
    .lightbox-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      padding: 16px 24px;
      border-radius: 50px;
      z-index: 10001;
    }
    
    .lightbox-btn {
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .lightbox-btn:hover {
      background: rgba(212, 175, 55, 0.4);
      border-color: rgba(212, 175, 55, 0.7);
    }
    
    .lightbox-zoom-level {
      color: #d4af37;
      font-size: 12px;
      font-weight: 600;
      min-width: 50px;
      text-align: center;
    }
    
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #d4af37;
      border-radius: 8px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 10001;
    }
    
    .lightbox-nav:hover {
      background: rgba(212, 175, 55, 0.4);
      border-color: rgba(212, 175, 55, 0.7);
    }
    
    .lightbox-nav.prev {
      left: 20px;
    }
    
    .lightbox-nav.next {
      right: 20px;
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #d4af37;
      border-radius: 8px;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 10001;
    }
    
    .lightbox-close:hover {
      background: rgba(212, 175, 55, 0.4);
      border-color: rgba(212, 175, 55, 0.7);
    }
    
    .lightbox-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #d4af37;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      z-index: 10001;
    }
    
    @media (max-width: 768px) {
      .lightbox-nav {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
      
      .lightbox-nav.prev {
        left: 10px;
      }
      
      .lightbox-nav.next {
        right: 10px;
      }
      
      .lightbox-controls {
        bottom: 20px;
        padding: 12px 16px;
        gap: 8px;
      }
      
      .lightbox-btn {
        padding: 8px 12px;
        font-size: 12px;
      }
    }
    
    /* PRODUCT SECTION */
    .product-section {
      margin-bottom: 50px;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #4a9fe2;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>

    function selectHeroImages(allImages) {
      if (!allImages || allImages.length === 0) return [];
      
      // Parse filename to extract color and view (front/back)
      const parseImage = (url) => {
        const filename = url.split('/').pop();
        const parts = filename.split('-');
        
        // Extract color (between product name and front/back)

      const selected = [

        ...backImages.slice(0, HERO_BACK_COUNT)
      ];
      
      // Return URLs only
      return selected.map(img => img.url);
    }

    class ProductCarousel {
      constructor(product, containerId) {
        this.product = product;
        this.container = document.getElementById(containerId);
        this.currentIndex = 0;
        this.autoAdvanceTimer = null;
        this.heroImages = HERO_IMAGES_COUNT ? selectHeroImages(product.images) : product.images;
        this.init();
      }
      
      init() {
        this.render();
        this.attachEventListeners();
        this.startAutoAdvance();
      }
      
      render() {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `

            <div class="carousel-inner" id="carousel-${this.product.id}">
              ${this.heroImages.map((img, idx) => `
                <div class="carousel-item ${idx === 0 ? 'active' : ''}">

              `).join('')}
            </div>
            <div class="image-counter">${this.currentIndex + 1}/${this.heroImages.length}</div>
            <div class="carousel-controls">

                <div class="dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>
              `).join('')}

          </div>

            <div class="product-price">${this.product.price}</div>

          </div>
        `;

        this.arrows.forEach(arrow => {
          arrow.addEventListener('click', (e) => {
            const dir = e.currentTarget.dataset.dir;
            dir === 'next' ? this.next() : this.prev();
          });
        });
        
        // Touch swipe
        let startX = 0;
        this.carouselContainer.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
          this.pauseAutoAdvance();
        });
        
        this.carouselContainer.addEventListener('touchend', (e) => {
          const endX = e.changedTouches[0].clientX;
          const diff = startX - endX;
          
          if (Math.abs(diff) > 30) {
            diff > 0 ? this.next() : this.prev();
          }
          this.startAutoAdvance();
        });
        
        // Pause on hover (desktop)
        this.carouselContainer.addEventListener('mouseenter', () => this.pauseAutoAdvance());
        this.carouselContainer.addEventListener('mouseleave', () => this.startAutoAdvance());
      }
      
      goToSlide(index) {
        this.currentIndex = index;
        this.updateCarousel();
        this.pauseAutoAdvance();
        this.startAutoAdvance();
      }
      
      next() {
        this.currentIndex = (this.currentIndex + 1) % this.heroImages.length;
        this.updateCarousel();
      }
      
      prev() {
        this.currentIndex = (this.currentIndex - 1 + this.heroImages.length) % this.heroImages.length;
        this.updateCarousel();
      }
      
      updateCarousel() {
        // Update items
        const items = this.carouselInner.querySelectorAll('.carousel-item');
        items.forEach((item, idx) => {
          item.classList.toggle('active', idx === this.currentIndex);
        });
        
        // Update dots
        this.dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === this.currentIndex);
        });
        
        // Update counter
        this.imageCounter.textContent = `${this.currentIndex + 1}/${this.heroImages.length}`;
      }
      
      startAutoAdvance() {
        this.autoAdvanceTimer = setInterval(() => this.next(), CAROUSEL_INTERVAL);
      }
      
      pauseAutoAdvance() {
        clearInterval(this.autoAdvanceTimer);
      }
    }
    
    // Initialize hero view
    function initHeroView() {
      const heroView = document.getElementById('heroView');
      heroView.innerHTML = '';
      productsData.forEach((product, idx) => {
        new ProductCarousel(product, 'heroView');
      });
    }
    
    // Initialize all images view (product grid)
    function initAllImagesView() {
      const allImagesView = document.getElementById('allImagesView');
      allImagesView.innerHTML = '';
      
      const grid = document.createElement('div');
      grid.className = 'products-grid';
      
      productsData.forEach(product => {
        const square = document.createElement('div');
        square.className = 'product-square';
        
        // Use first hero image as card image
        const heroImages = selectHeroImages(product.images);
        const heroImg = heroImages[0] || product.images[0] || '';
        const productName = product.name.split(' ').slice(0, 3).join(' '); // First 3 words
        
        square.innerHTML = `
          <img src="${heroImg}" alt="${product.name}" loading="lazy" />
          <div class="product-square-label">${productName}</div>
        `;
        
        square.addEventListener('click', () => showProductDetail(product));
        grid.appendChild(square);
      });
      
      allImagesView.appendChild(grid);
    }
    
    // Show product detail modal
    function showProductDetail(product) {
      const modal = document.getElementById('product-detail-modal');
      const title = document.getElementById('product-detail-title');
      const grid = document.getElementById('product-detail-grid');
      
      title.textContent = product.name;
      grid.innerHTML = '';
      
      product.images.forEach((img, idx) => {
        const item = document.createElement('div');
        item.className = 'product-detail-img';
        item.innerHTML = `<img src="${img}" alt="${product.name} - Image ${idx + 1}" loading="lazy" />`;
        item.addEventListener('click', () => openLightbox(product.images, idx));
        grid.appendChild(item);
      });
      
      modal.classList.add('active');
    }
    
    // Close modal
    function closeProductDetail() {
      document.getElementById('product-detail-modal').classList.remove('active');
    }
    
    // LIGHTBOX / IMAGE ZOOM
    let lightboxState = {
      images: [],
      currentIndex: 0,
      zoomLevel: 100
    };
    
    function openLightbox(images, index) {
      lightboxState.images = images;
      lightboxState.currentIndex = index;
      lightboxState.zoomLevel = 100;
      
      const lightbox = document.getElementById('image-lightbox');
      const img = document.getElementById('lightbox-image');
      
      img.src = images[index];
      img.style.transform = 'scale(1)';
      
      updateLightboxUI();
      lightbox.classList.add('active');
    }
    
    function closeLightbox() {
      document.getElementById('image-lightbox').classList.remove('active');
    }
    
    function updateLightboxUI() {
      const counter = document.getElementById('lightbox-counter');
      const zoomLevel = document.getElementById('lightbox-zoom-level');
      
      counter.textContent = `${lightboxState.currentIndex + 1}/${lightboxState.images.length}`;
      zoomLevel.textContent = `${lightboxState.zoomLevel}%`;
      
      const img = document.getElementById('lightbox-image');
      img.style.transform = `scale(${lightboxState.zoomLevel / 100})`;
    }
    
    function nextImage() {
      lightboxState.currentIndex = (lightboxState.currentIndex + 1) % lightboxState.images.length;
      lightboxState.zoomLevel = 100;
      document.getElementById('lightbox-image').src = lightboxState.images[lightboxState.currentIndex];
      updateLightboxUI();
    }
    
    function prevImage() {
      lightboxState.currentIndex = (lightboxState.currentIndex - 1 + lightboxState.images.length) % lightboxState.images.length;
      lightboxState.zoomLevel = 100;
      document.getElementById('lightbox-image').src = lightboxState.images[lightboxState.currentIndex];
      updateLightboxUI();
    }
    
    function zoomIn() {
      if (lightboxState.zoomLevel < 300) {
        lightboxState.zoomLevel += 20;
        updateLightboxUI();
      }
    }
    
    function zoomOut() {
      if (lightboxState.zoomLevel > 100) {
        lightboxState.zoomLevel -= 20;
        updateLightboxUI();
      }
    }
    
    // Lightbox event listeners
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', prevImage);
    document.getElementById('lightbox-next').addEventListener('click', nextImage);
    document.getElementById('lightbox-zoom-in').addEventListener('click', zoomIn);
    document.getElementById('lightbox-zoom-out').addEventListener('click', zoomOut);
    
    // Close lightbox on background click
    document.getElementById('image-lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'image-lightbox') closeLightbox();
    });
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('image-lightbox');
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === '+' || e.key === '=') zoomIn();
      if (e.key === '-') zoomOut();
    });
    
    // Modal event listeners
    document.getElementById('product-detail-close').addEventListener('click', closeProductDetail);
    document.getElementById('product-detail-modal').addEventListener('click', (e) => {
      if (e.target.id === 'product-detail-modal') closeProductDetail();
    });
    
    // View toggle
    document.getElementById('heroViewBtn').addEventListener('click', function() {
      this.classList.add('active');
      document.getElementById('allImagesBtn').classList.remove('active');
      document.getElementById('heroView').style.display = 'grid';
      document.getElementById('allImagesView').style.display = 'block';
      document.getElementById('allImagesView').innerHTML = '';
      initHeroView();
    });
    
    document.getElementById('allImagesBtn').addEventListener('click', function() {
      this.classList.add('active');
      document.getElementById('heroViewBtn').classList.remove('active');
      document.getElementById('heroView').style.display = 'none';
      document.getElementById('allImagesView').style.display = 'block';
      document.getElementById('allImagesView').innerHTML = '';
      initAllImagesView();
    });
    
    // Initialize on load
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        // Load image manifest
        const response = await fetch('./assets/images/images-manifest.json');
        const manifest = await response.json();
        
        // Populate images for each product
        productsData.forEach(product => {
          if (manifest[product.id]) {
            const data = manifest[product.id];
            product.images = data.images.map(img => `./assets/images/EuropaWatersClothingLine_compressed/${data.folder}/full/${img}`);
          }
        });
        
        initHeroView();
      } catch (error) {
        console.error('Failed to load images manifest:', error);
      }
    });
  </script>
</body>
</html>
