<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europa Waters - Clothing Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050d1a;
      color: #e8eef6;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px 0;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #4a9fe2;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 14px;
      color: #8b98b1;
      font-weight: 500;
    }
    
    .view-toggle {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }
    
    .view-btn {
      padding: 10px 20px;
      border: 2px solid #4a9fe2;
      background: transparent;
      color: #4a9fe2;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .view-btn.active {
      background: #4a9fe2;
      color: #050d1a;
    }
    
    .view-btn:hover {
      background: rgba(74, 144, 226, 0.1);
    }
    
    /* HERO VIEW */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }
    
    @media (min-width: 768px) {
      .hero-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1200px) {
      .hero-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    .product-card {
      background: #0b1729;
      border: 1px solid rgba(74, 144, 226, 0.18);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    
    .product-card:hover {
      border-color: #4a9fe2;
    }
    
    /* CAROUSEL */
    .carousel-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      overflow: hidden;
      border-radius: 10px;
    }
    
    .carousel-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .carousel-item {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .carousel-item.active {
      opacity: 1;
      z-index: 1;
    }
    
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* CONTROLS */
    .carousel-controls {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .dot.active {
      background: #4a9fe2;
      width: 24px;
      border-radius: 4px;
    }
    
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(74, 144, 226, 0.8);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.3s ease;
      z-index: 5;
    }
    
    @media (min-width: 768px) {
      .carousel-arrow {
        display: flex;
      }
    }
    
    .carousel-arrow:hover {
      background: #4a9fe2;
    }
    
    .carousel-prev {
      left: 8px;
    }
    
    .carousel-next {
      right: 8px;
    }
    
    .image-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      z-index: 5;
    }
    
    /* PRODUCT INFO */
    .product-info {
      padding: 16px;
    }
    
    .product-name {
      font-size: 16px;
      font-weight: 700;
      color: #e8eef6;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #4a9fe2;
      margin-bottom: 12px;
    }
    
    .shop-btn {
      width: 100%;
      padding: 12px;
      background: #4a9fe2;
      color: #050d1a;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .shop-btn:active {
      background: #357fc9;
      transform: scale(0.98);
    }
    
    /* ALL IMAGES VIEW */
    .all-images-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .all-images-grid.active {
      display: grid;
    }
    
    @media (min-width: 768px) {
      .all-images-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
    
    .image-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #0b1729;
      border: 1px solid rgba(74, 144, 226, 0.18);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    
    .image-item:active {
      transform: scale(0.95);
    }
    
    .image-item:hover {
      border-color: #4a9fe2;
    }
    
    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .image-label {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 3px;
    }
    
    /* PRODUCT SECTION */
    .product-section {
      margin-bottom: 50px;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #4a9fe2;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Europa Waters Clothing Collection</h1>
      <p class="subtitle">Curated designs inspired by nature and science</p>
    </header>
    
    <div class="view-toggle">
      <button class="view-btn active" id="heroViewBtn">Hero View</button>
      <button class="view-btn" id="allImagesBtn">All Images</button>
    </div>
    
    <div id="heroView" class="hero-grid"></div>
    <div id="allImagesView" class="all-images-grid"></div>
  </div>
  
  <script>
    // CSV DATA - All 11 products (folder mapping for compressed images)
    const productsData = [
      { id: "product_bda2737e-74fe-4ad5-b1e1-b6405f089c96", name: "Wandering Fern Unisex Hoodie", price: "$30.50", folder: "WanderingFern_hoodie", images: [] },
      { id: "product_7e8f2d1a-9c3b-4e5f-a2d8-c1b5f7e9d3a1", name: "Europa Flower Unisex Hoodie", price: "$37.00", folder: "europaflower_hoodie", images: [] },
      { id: "product_5a2f1c9b-8d7e-4c3a-b1f9-e7d5c2a8b6f3", name: "Our North Stars Unisex Classic Tee", price: "$15.00", folder: "OurNorthStars_tee", images: [] },
      { id: "product_9d3b8f1c-2e5a-4b7f-c8d1-a3f5e7b9c2d6", name: "Hummingbird Floral Skater Dress", price: "$42.95", folder: "Hummingbird_dress", images: [] },
      { id: "product_3c7e2a1f-6b9d-4e8a-f5c2-b1d7e3a9f5c8", name: "Under Armour Athletic T-Shirt", price: "$35.50", folder: "jupiterandmoons_tee", images: [] },
      { id: "product_8b5f3d2c-9a7e-4c1b-e6f2-d5a8c1b7e3f9", name: "Europa Waters Unisex Hoodie", price: "$39.00", folder: "europawaters_hoodie", images: [] },
      { id: "product_2d8c5a3b-7e1f-4a9c-d7b4-f2c8e1a6d5b9", name: "Europa Waters Unisex Sweatshirt", price: "$32.00", folder: "europawaters_crewhoodie", images: [] },
      { id: "product_1a6f4e2b-8d3c-4f7a-c5e1-b9a2f8d4c7e3", name: "Europa Waters Unisex Classic Tee", price: "$17.50", folder: "europawaters_tee", images: [] },
      { id: "product_7c2a5d1e-3f8b-4e9c-a7d2-f4b6e1c8d5a9", name: "Jupiter and Galilean Moons Premium Sweatshirt", price: "$45.00", folder: "jupiterandmoons_crewhoodie", images: [] },
      { id: "product_4b8d3f2a-6c5e-4a7b-d1f9-e8c2b5a7d4c6", name: "Kepler's First Law", price: "$38.24", folder: "keplersfirstlaw_hoodie", images: [] },
      { id: "product_9e7a2c1d-4f6b-4c8e-b3a5-c9d1e7f2a8b4", name: "Europa Flower Crew Neck Sweatshirt", price: "$23.35", folder: "europaflower_crewhoodie", images: [] }
    ];
    
    const baseUrl = './assets/EuropaWatersClothingLine_compressed/';
    const CAROUSEL_INTERVAL = 4500; // 4.5 seconds
    const HERO_IMAGES_COUNT = 6;
    
    // Product folder mapping
    const productFolderMap = {
      'product_bda2737e-74fe-4ad5-b1e1-b6405f089c96': 'WanderingFern_hoodie',
      'product_7e8f2d1a-9c3b-4e5f-a2d8-c1b5f7e9d3a1': 'europaflower_hoodie',
      'product_5a2f1c9b-8d7e-4c3a-b1f9-e7d5c2a8b6f3': 'OurNorthStars_tee',
      'product_9d3b8f1c-2e5a-4b7f-c8d1-a3f5e7b9c2d6': 'Hummingbird_dress',
      'product_3c7e2a1f-6b9d-4e8a-f5c2-b1d7e3a9f5c8': 'jupiterandmoons_tee',
      'product_8b5f3d2c-9a7e-4c1b-e6f2-d5a8c1b7e3f9': 'europawaters_hoodie',
      'product_2d8c5a3b-7e1f-4a9c-d7b4-f2c8e1a6d5b9': 'europawaters_crewhoodie',
      'product_1a6f4e2b-8d3c-4f7a-c5e1-b9a2f8d4c7e3': 'europawaters_tee',
      'product_7c2a5d1e-3f8b-4e9c-a7d2-f4b6e1c8d5a9': 'jupiterandmoons_crewhoodie',
      'product_4b8d3f2a-6c5e-4a7b-d1f9-e8c2b5a7d4c6': 'keplersfirstlaw_hoodie',
      'product_9e7a2c1d-4f6b-4c8e-b3a5-c9d1e7f2a8b4': 'europaflower_crewhoodie'
    };
    
    class ProductCarousel {
      constructor(product, containerId) {
        this.product = product;
        this.container = document.getElementById(containerId);
        this.currentIndex = 0;
        this.autoAdvanceTimer = null;
        this.heroImages = product.images.slice(0, HERO_IMAGES_COUNT);
        this.init();
      }
      
      init() {
        this.render();
        this.attachEventListeners();
        this.startAutoAdvance();
      }
      
      render() {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="carousel-container">
            <div class="carousel-inner" id="carousel-${this.product.id}">
              ${this.heroImages.map((img, idx) => `
                <div class="carousel-item ${idx === 0 ? 'active' : ''}">
                  <img src="${img}" alt="${this.product.name} image ${idx + 1}" loading="lazy" />
                </div>
              `).join('')}
            </div>
            <div class="image-counter">${this.currentIndex + 1}/${this.heroImages.length}</div>
            <div class="carousel-controls">
              ${this.heroImages.map((_, idx) => `
                <div class="dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>
              `).join('')}
            </div>
            <button class="carousel-arrow carousel-prev" data-dir="prev">‹</button>
            <button class="carousel-arrow carousel-next" data-dir="next">›</button>
          </div>
          <div class="product-info">
            <div class="product-name">${this.product.name}</div>
            <div class="product-price">${this.product.price}</div>
            <button class="shop-btn">Shop Now</button>
          </div>
        `;
        
        this.container.appendChild(card);
        this.carouselInner = card.querySelector(`#carousel-${this.product.id}`);
        this.carouselContainer = card.querySelector('.carousel-container');
        this.imageCounter = card.querySelector('.image-counter');
        this.dots = Array.from(card.querySelectorAll('.dot'));
        this.arrows = Array.from(card.querySelectorAll('.carousel-arrow'));
      }
      
      attachEventListeners() {
        // Dots
        this.dots.forEach(dot => {
          dot.addEventListener('click', (e) => this.goToSlide(parseInt(e.target.dataset.index)));
        });
        
        // Arrows
        this.arrows.forEach(arrow => {
          arrow.addEventListener('click', (e) => {
            const dir = e.currentTarget.dataset.dir;
            dir === 'next' ? this.next() : this.prev();
          });
        });
        
        // Touch swipe
        let startX = 0;
        this.carouselContainer.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
          this.pauseAutoAdvance();
        });
        
        this.carouselContainer.addEventListener('touchend', (e) => {
          const endX = e.changedTouches[0].clientX;
          const diff = startX - endX;
          
          if (Math.abs(diff) > 30) {
            diff > 0 ? this.next() : this.prev();
          }
          this.startAutoAdvance();
        });
        
        // Pause on hover (desktop)
        this.carouselContainer.addEventListener('mouseenter', () => this.pauseAutoAdvance());
        this.carouselContainer.addEventListener('mouseleave', () => this.startAutoAdvance());
      }
      
      goToSlide(index) {
        this.currentIndex = index;
        this.updateCarousel();
        this.pauseAutoAdvance();
        this.startAutoAdvance();
      }
      
      next() {
        this.currentIndex = (this.currentIndex + 1) % this.heroImages.length;
        this.updateCarousel();
      }
      
      prev() {
        this.currentIndex = (this.currentIndex - 1 + this.heroImages.length) % this.heroImages.length;
        this.updateCarousel();
      }
      
      updateCarousel() {
        // Update items
        const items = this.carouselInner.querySelectorAll('.carousel-item');
        items.forEach((item, idx) => {
          item.classList.toggle('active', idx === this.currentIndex);
        });
        
        // Update dots
        this.dots.forEach((dot, idx) => {
          dot.classList.toggle('active', idx === this.currentIndex);
        });
        
        // Update counter
        this.imageCounter.textContent = `${this.currentIndex + 1}/${this.heroImages.length}`;
      }
      
      startAutoAdvance() {
        this.autoAdvanceTimer = setInterval(() => this.next(), CAROUSEL_INTERVAL);
      }
      
      pauseAutoAdvance() {
        clearInterval(this.autoAdvanceTimer);
      }
    }
    
    // Initialize hero view
    function initHeroView() {
      const heroView = document.getElementById('heroView');
      heroView.innerHTML = '';
      productsData.forEach((product, idx) => {
        new ProductCarousel(product, 'heroView');
      });
    }
    
    // Initialize all images view
    function initAllImagesView() {
      const allImagesView = document.getElementById('allImagesView');
      allImagesView.innerHTML = '';
      
      productsData.forEach(product => {
        const productSection = document.createElement('div');
        productSection.className = 'product-section';
        
        const title = document.createElement('div');
        title.className = 'section-title';
        title.textContent = product.name;
        productSection.appendChild(title);
        
        const grid = document.createElement('div');
        grid.className = 'all-images-grid active';
        
        product.images.forEach((img, idx) => {
          const item = document.createElement('div');
          item.className = 'image-item';
          item.style.position = 'relative';
          item.innerHTML = `
            <img src="${img}" alt="${product.name} - Image ${idx + 1}" loading="lazy" />
            <div class="image-label">#${idx + 1}</div>
          `;
          grid.appendChild(item);
        });
        
        productSection.appendChild(grid);
        allImagesView.appendChild(productSection);
      });
    }
    
    // View toggle
    document.getElementById('heroViewBtn').addEventListener('click', function() {
      this.classList.add('active');
      document.getElementById('allImagesBtn').classList.remove('active');
      document.getElementById('heroView').style.display = 'grid';
      document.getElementById('allImagesView').style.display = 'none';
    });
    
    document.getElementById('allImagesBtn').addEventListener('click', function() {
      this.classList.add('active');
      document.getElementById('heroViewBtn').classList.remove('active');
      document.getElementById('heroView').style.display = 'none';
      document.getElementById('allImagesView').style.display = 'grid';
    });
    
    // Initialize on load
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        // Load image manifest
        const response = await fetch('./assets/images/images-manifest.json');
        const manifest = await response.json();
        
        // Populate images for each product
        productsData.forEach(product => {
          if (manifest[product.id]) {
            const data = manifest[product.id];
            product.images = data.images.map(img => `./assets/images/EuropaWatersClothingLine_compressed/${data.folder}/full/${img}`);
          }
        });
        
        initHeroView();
        initAllImagesView();
      } catch (error) {
        console.error('Failed to load images manifest:', error);
      }
    });
  </script>
</body>
</html>
