<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess App Preview — Europa Waters LLC</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .preview-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      gap: 2rem;
    }

    .preview-back {
      position: fixed;
      top: 24px;
      left: 24px;
      font-family: var(--font-head);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.2s;
    }
    .preview-back:hover { opacity: 0.7; }

    .preview-header { text-align: center; }

    .preview-badge {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soon);
      background: rgba(240, 165, 0, 0.12);
      border: 1px solid rgba(240, 165, 0, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    .preview-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .preview-sub {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── Media container ── */
    .preview-media {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* VIDEO — swap src when ready */
    .preview-media video {
      width: 100%;
      display: block;
    }

    /* GIF fallback / placeholder */
    .preview-media img {
      width: 100%;
      display: block;
    }

    .preview-placeholder {
      aspect-ratio: 9/19.5;   /* iPhone screen ratio */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 2rem;
      text-align: center;
    }

    .preview-placeholder-icon { font-size: 3.5rem; }

    .preview-placeholder code {
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(74,159,226,0.08);
      padding: 4px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <a href="software.html" class="preview-back">← Software</a>

  <main class="preview-page">

    <div class="preview-header">
      <div class="preview-badge">In Development</div>
      <h1 class="preview-title">&#x265E; Chess App</h1>
      <p class="preview-sub">iOS &nbsp;·&nbsp; Swift &nbsp;·&nbsp; Game Development</p>
    </div>

    <div class="preview-media">
      <!--
        TO ADD VIDEO:
          Replace the placeholder div below with:
          <video autoplay loop muted playsinline>
            <source src="../assets/videos/chess-preview.mp4" type="video/mp4">
          </video>

        TO ADD GIF:
          <img src="../assets/images/chess-preview.gif" alt="Chess App preview">
      -->
      <div class="preview-placeholder">
        <span class="preview-placeholder-icon">&#x265E;</span>
        <p>Preview coming soon</p>
        <p>Drop your MP4 or GIF at:</p>
        <code>assets/videos/chess-preview.mp4</code>
        <p style="margin-top:0.5rem; font-size:0.75rem; opacity:0.6;">
          Then uncomment the &lt;video&gt; tag in this file
        </p>
      </div>
    </div>

  </main>

</body>
</html>
