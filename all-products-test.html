    function renderProducts() {
      const container = document.getElementById('products-container');
      
      productsData.forEach((product, idx) => {
        const section = document.createElement('div');
        section.className = 'product-section';
        
        const header = document.createElement('div');
        header.className = 'product-header';
        header.innerHTML = `
          <div>
            <div class="product-title">${idx + 1}. ${product.name}</div>
          </div>
          <div class="product-meta">
            <div class="product-price">${product.price}</div>
            <div style="margin-top: 5px;">${product.images.length} images</div>
          </div>
        `;
        section.appendChild(header);
        
        const gallery = document.createElement('div');
        gallery.className = 'image-gallery';
        
        product.images.forEach((img, imgIdx) => {
          const item = document.createElement('div');
          item.className = 'gallery-item';
          const imageUrl = img.startsWith('http') ? img : `https://static.wixstatic.com/media/${img}`;
          item.innerHTML = `
            <img src="${imageUrl}" alt="Image ${imgIdx + 1}" />
            <div class="gallery-item-label">#${imgIdx + 1}</div>
          `;
          gallery.appendChild(item);
        });
        
        section.appendChild(gallery);
        container.appendChild(section);
      });
    }

    renderProducts();
  </script>
